<!DOCTYPE html>
<html>
<head>
    <title>Customers</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; }
        .navbar { background: #2c3e50; color: white; padding: 15px 30px; font-size: 20px; }
        .container { padding: 30px; }
        form { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #2c3e50; color: white; }
    </style>
</head>
<body>
    <div class="navbar">👥 Customer Management</div>
    <div class="container">
        <h2>Add Customer</h2>
        <form method="POST" action="/customers/add">
            <input type="text" name="name" placeholder="Customer name" required>
            <input type="text" name="phone" placeholder="Phone number">
            <input type="email" name="email" placeholder="Email address">
            <button type="submit">Add Customer</button>
        </form>

        <h2>Customer List</h2>
        <table>
            <tr>
                <th>Name</th><th>Phone</th><th>Email</th><th>Actions</th>
            </tr>
            {% for customer in customers %}
<tr>
    <td>{{ customer.name }}</td>
    <td>{{ customer.phone }}</td>
    <td>{{ customer.email }}</td>
    <td>
        <a href="/customers/edit/{{ customer.id }}" 
           style="background:#2c3e50; color:white; 
           padding:5px 10px; border-radius:4px; 
           text-decoration:none;">Edit</a>
        <a href="/customers/delete/{{ customer.id }}" 
           style="background:#e74c3c; color:white; 
           padding:5px 10px; border-radius:4px; 
           text-decoration:none;"
           onclick="return confirm('Delete this customer?')">
           Delete</a>
    </td>
</tr>
{% endfor %}

        </table>
    </div>
</body>
</html>
