<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; margin: 0; background: #2c3e50; 
            display: flex; justify-content: center; 
            align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; 
            border-radius: 8px; width: 300px; text-align: center; }
        .login-box h1 { color: #2c3e50; margin-bottom: 5px; }
        .login-box p { color: #888; margin-bottom: 25px; }
        input { width: 90%; padding: 10px; margin: 8px 0; 
            border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #2c3e50; 
            color: white; border: none; border-radius: 4px; 
            cursor: pointer; font-size: 16px; margin-top: 10px; }
        .error { background: #fff3cd; color: #e74c3c; 
            padding: 10px; border-radius: 4px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔧</h1>
        <h1>Hardware Manager</h1>
        <p>Sign in to your account</p>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" 
                placeholder="Username" required>
            <input type="password" name="password" 
                placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
