<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: Arial; 
            background: #0d1b2a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        .login-box { 
            background: #1a1a1a; 
            padding: 50px 40px; 
            border-radius: 10px; 
            width: 360px; 
            text-align: center;
            border-top: 4px solid #C9A84C;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .icon { font-size: 48px; margin-bottom: 10px; }
        h1 { 
            color: #C9A84C; 
            font-size: 22px; 
            margin-bottom: 5px; 
        }
        p { 
            color: #888; 
            font-size: 14px; 
            margin-bottom: 30px; 
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            color: #C9A84C;
            font-size: 13px;
            display: block;
            margin-bottom: 5px;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            background: #0d1b2a;
            border: 1px solid #333; 
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #C9A84C;
        }
        button { 
            width: 100%; 
            padding: 13px; 
            background: #C9A84C; 
            color: #0d1b2a; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        button:hover { background: #b8963e; }
        .error { 
            background: #2a0d0d; 
            color: #e74c3c; 
            padding: 10px; 
            border-radius: 6px; 
            margin-bottom: 15px;
            font-size: 13px;
            border-left: 3px solid #e74c3c;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon">🔧</div>
        <h1>Business Manager</h1>
        <p>Sign in to your account</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" name="username" 
                    placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" name="password" 
                    placeholder="Enter password" required>
            </div>
            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>
</html>
