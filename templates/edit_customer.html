<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial; background: #0d1b2a; min-height: 100vh; }
        .navbar { 
            background: #1a1a1a; 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 3px solid #C9A84C;
        }
        .navbar-left { 
            color: #C9A84C; 
            font-size: 20px; 
            font-weight: bold;
            letter-spacing: 1px;
        }
        .navbar-right { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .btn-back {
            color: #C9A84C;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #C9A84C;
            padding: 6px 12px;
            border-radius: 4px;
        }
        .btn-logout { 
            background: #C9A84C; 
            color: #0d1b2a; 
            padding: 8px 16px; 
            border-radius: 4px; 
            text-decoration: none; 
            font-size: 13px;
            font-weight: bold;
        }
        .container { padding: 30px; }
        .page-title {
            color: #C9A84C;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .form-card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            border-top: 3px solid #C9A84C;
            max-width: 500px;
        }
        .form-card h2 {
            color: #C9A84C;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            color: #C9A84C;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 6px;
        }
        input { 
            width: 100%;
            padding: 10px 12px; 
            background: #0d1b2a;
            border: 1px solid #333; 
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #C9A84C;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-primary { 
            background: #C9A84C; 
            color: #0d1b2a; 
            padding: 10px 25px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .btn-primary:hover { background: #b8963e; }
        .btn-cancel { 
            background: #7b1c1c;
            color: #ff6b6b; 
            padding: 10px 25px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">✏️ EDIT CUSTOMER</div>
        <div class="navbar-right">
            <a href="/customers" class="btn-back">← Customers</a>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </div>

    <div class="container">
        <p class="page-title">Edit Customer Details</p>

        <div class="form-card">
            <h2>Update Details</h2>
            <form method="POST">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" name="name" 
                        value="{{ customer.name }}" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" 
                        value="{{ customer.phone }}">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" 
                        value="{{ customer.email }}">
                </div>
                <div class="btn-row">
                    <button type="submit" class="btn-primary">
                        SAVE CHANGES
                    </button>
                    <a href="/customers" class="btn-cancel">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
