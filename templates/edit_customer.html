<!DOCTYPE html>
<html>
<head>
    <title>Edit Customer</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; }
        .navbar { background: #2c3e50; color: white; padding: 15px 30px; font-size: 20px; }
        .container { padding: 30px; }
        form { background: white; padding: 20px; border-radius: 8px; }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .cancel { background: #e74c3c; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="navbar">✏️ Edit Customer</div>
    <div class="container">
        <h2>Edit Customer</h2>
        <form method="POST">
            <input type="text" name="name" 
                value="{{ customer.name }}" required>
            <input type="text" name="phone" 
                value="{{ customer.phone }}">
            <input type="email" name="email" 
                value="{{ customer.email }}">
            <button type="submit">Save Changes</button>
            <a href="/customers" class="cancel">Cancel</a>
        </form>
    </div>
</body>
</html>
