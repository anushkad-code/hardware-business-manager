<!DOCTYPE html>
<html>
<head>
    <title>Hardware Business Manager</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; }
        .navbar { background: #2c3e50; color: white; padding: 15px 30px; font-size: 20px; }
        .cards { display: flex; gap: 20px; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; width: 200px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h2 { color: #2c3e50; }
    </style>
</head>
<body>
    <div class="navbar">🔧 Hardware Business Manager</div>
    <div class="cards">
        <div class="card"><h2>📦</h2><p>Inventory</p></div>
        <div class="card"><h2>👥</h2><p>Customers</p></div>
        <div class="card"><h2>📋</h2><p>Jobs</p></div>
        <div class="card"><h2>🧾</h2><p>Invoices</p></div>
    </div>
</body>
</html>
