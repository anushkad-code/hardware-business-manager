<!DOCTYPE html>
<html>
<head>
    <title>Inventory</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; }
        .navbar { background: #2c3e50; color: white; padding: 15px 30px; font-size: 20px; }
        .container { padding: 30px; }
        form { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        input, select { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #2c3e50; color: white; }
        .search-bar { background: white; padding: 15px 20px; 
            border-radius: 8px; margin-bottom: 20px; 
            display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>
    <div class="navbar">📦 Inventory Management</div>
    <div class="container">
        <h2>Add Item</h2>
        <form method="POST" action="/inventory/add">
            <input type="text" name="name" placeholder="Item name" required>
            <input type="number" name="quantity" placeholder="Quantity" required>
            <input type="number" name="price" placeholder="Price" step="0.01" required>
            <input type="text" name="category" placeholder="Category">
            <button type="submit">Add Item</button>
        </form>

        <h2>Current Stock</h2>

        <form method="GET" action="/inventory" class="search-bar">
            <input type="text" name="search" 
                placeholder="🔍 Search items..." 
                value="{{ search }}">
            <select name="category">
                <option value="">All Categories</option>
                {% for cat in categories %}
                <option value="{{ cat }}" 
                    {% if cat == category %}selected{% endif %}>
                    {{ cat }}
                </option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
            <a href="/inventory" 
               style="background:#95a5a6; color:white; 
               padding:10px 20px; border-radius:4px; 
               text-decoration:none;">Clear</a>
        </form>

        <table>
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>
                    {{ item.quantity }}
                    {% if item.quantity < 10 %}
                    <span style="background:#e74c3c; color:white; 
                        padding:2px 8px; border-radius:4px; 
                        font-size:12px; margin-left:5px;">
                        ⚠️ Low Stock
                    </span>
                    {% endif %}
                </td>
                <td>${{ item.price }}</td>
                <td>{{ item.category }}</td>
                <td>
                    <a href="/inventory/edit/{{ item.id }}" 
                       style="background:#2c3e50; color:white; 
                       padding:5px 10px; border-radius:4px; 
                       text-decoration:none;">Edit</a>
                    <a href="/inventory/delete/{{ item.id }}" 
                       style="background:#e74c3c; color:white; 
                       padding:5px 10px; border-radius:4px; 
                       text-decoration:none;"
                       onclick="return confirm('Delete this item?')">
                       Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
