
<!DOCTYPE html>
<html>
<head>
    <title>Create User</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; }
        .navbar { background: #2c3e50; color: white; padding: 15px 30px; font-size: 20px; }
        .container { padding: 30px; }
        form { background: white; padding: 20px; border-radius: 8px; }
        input, select { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .cancel { background: #e74c3c; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="navbar">👤 Create Staff Account</div>
    <div class="container">
        <h2>New User</h2>
        <form method="POST">
            <input type="text" name="username" 
                placeholder="Username" required>
            <input type="password" name="password" 
                placeholder="Password" required>
            <select name="role">
                <option value="staff">Staff</option>
                <option value="admin">Admin</option>
            </select>
            <button type="submit">Create User</button>
            <a href="/" class="cancel">Cancel</a>
        </form>
    </div>
</body></html>
