<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial; background: #000000; min-height: 100vh; }
        .navbar { 
            background: #1a1a1a; 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 3px solid #C9A84C;
        }
        .navbar-left { 
            color: #C9A84C; 
            font-size: 20px; 
            font-weight: bold;
            letter-spacing: 1px;
        }
        .navbar-right { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .btn-back {
            color: #C9A84C;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #C9A84C;
            padding: 6px 12px;
            border-radius: 4px;
        }
        .btn-logout { 
            background: #C9A84C; 
            color: #000000; 
            padding: 8px 16px; 
            border-radius: 4px; 
            text-decoration: none; 
            font-size: 13px;
            font-weight: bold;
        }
        .container { padding: 30px; }
        .page-title {
            color: #C9A84C;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .form-card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            border-top: 3px solid #C9A84C;
            max-width: 500px;
        }
        .form-card h2 {
            color: #C9A84C;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            color: #C9A84C;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 6px;
        }
        input, select { 
            width: 100%;
            padding: 10px 12px; 
            background: #000000;
            border: 1px solid #333; 
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #C9A84C;
        }
        input::placeholder { color: #555; }
        select option { background: #000000; }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-primary { 
            background: #C9A84C; 
            color: #000000; 
            padding: 10px 25px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .btn-primary:hover { background: #b8963e; }
        .btn-cancel { 
            background: #7b1c1c;
            color: #ff6b6b; 
            padding: 10px 25px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: bold;
        }
        .success {
            background: #1a3a1a;
            color: #2ecc71;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            border-left: 3px solid #2ecc71;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">👤 CREATE USER</div>
        <div class="navbar-right">
            <a href="/" class="btn-back">← Dashboard</a>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </div>

    <div class="container">
        <p class="page-title">Staff Account Management</p>

        <div class="form-card">
            <h2>New Staff Account</h2>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="success">✅ {{ messages[0] }}</div>
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" 
                        placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" 
                        placeholder="Enter password" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select name="role">
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="btn-row">
                    <button type="submit" class="btn-primary">
                        CREATE ACCOUNT
                    </button>
                    <a href="/" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
